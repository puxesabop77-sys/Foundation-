<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEI Junior Player</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#050505;color:#fff}
.header{height:72px;background:#0a0a0a;display:flex;justify-content:space-between;align-items:center;padding:0 20px;border-bottom:1px solid #222}
.logo{font-size:28px;font-weight:800}
.home{color:#fff;text-decoration:none;background:#111;padding:10px 16px;border-radius:10px}
.hero{padding:24px}
.hero h1{font-size:42px}
.hero p{color:#aaa}
.search{padding:0 24px 20px}
.search input{width:100%;padding:14px;border:none;border-radius:12px;background:#111;color:#fff}
.layout{display:grid;grid-template-columns:2fr 1fr;gap:20px;padding:0 24px 24px}
.playerbox,.sidebar{background:#0b0b0b;border:1px solid #222;border-radius:18px;padding:14px}
#player{width:100%;aspect-ratio:16/9}
.sidebar{max-height:75vh;overflow:auto}
.card{display:flex;gap:10px;background:#111;padding:10px;border-radius:12px;margin-bottom:10px;cursor:pointer}
.card img{width:120px;height:68px;object-fit:cover;border-radius:8px}
.card:hover{background:#1b1b1b}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<div class="logo">FEI Junior</div>
<a href="index.html" class="home">Home</a>
</div>

<div class="hero">
<h1>Classes 5–8 Video Library</h1>
<p>Uses Vercel backend endpoint. Environment variables stay hidden on server.</p>
</div>

<div class="search">
<input id="searchBox" placeholder="Search and press Enter">
</div>

<div class="layout">
<div class="playerbox">
<div id="player"></div>
<h2 id="videoTitle">Search a video</h2>
</div>
<div id="results" class="sidebar"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
    playerVars:{controls:1,rel:0,modestbranding:1}
  });
}

async function searchVideos(q){
  const res = await fetch('/api/youtube?q=' + encodeURIComponent(q));
  const videos = await res.json();

  const results = document.getElementById('results');
  results.innerHTML='';

  videos.forEach(v=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`<img src="${v.thumbnail}"><div>${v.title}</div>`;
    el.onclick=()=>{
      player.loadVideoById(v.videoId);
      document.getElementById('videoTitle').innerText=v.title;
    };
    results.appendChild(el);
  });
}

document.getElementById('searchBox').addEventListener('keypress',e=>{
  if(e.key==='Enter') searchVideos(e.target.value);
});

window.onload=()=>searchVideos('Class 5 Mathematics');
</script>
</body>
</html>
