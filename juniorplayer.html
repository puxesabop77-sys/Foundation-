<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundation Edge Junior Player</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#050505;color:#fff}
.header{background:#0b0b0b;border-bottom:1px solid #222;padding:16px 24px;display:flex;justify-content:space-between}
.logo{font-size:28px;font-weight:800;color:#e50914}
.search{padding:20px}
.search input{width:100%;padding:14px;border-radius:12px;border:none;background:#111;color:#fff}
.hero{padding:0 20px 20px}
.hero h1{font-size:42px}
.player{margin:20px;background:#0b0b0b;padding:16px;border-radius:20px}
#player{width:100%;aspect-ratio:16/9}
.tabs{display:flex;gap:10px;padding:0 20px}
.tab{background:#111;padding:10px 18px;border-radius:10px;cursor:pointer}
.active{background:#e50914}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:20px}
.card{background:#111;border-radius:14px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:150px;object-fit:cover}
.card h4{padding:10px;font-size:14px}
footer{text-align:center;padding:30px;color:#bbb}
footer a{color:#e50914;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="header">
<div class="logo">FEI JUNIOR</div>
<a href="index.html" style="color:white;text-decoration:none">Home</a>
</div>

<div class="hero">
<h1>Classes 5–8 Learning Hub</h1>
</div>

<div class="search">
<input id="q" placeholder="Search videos...">
</div>

<div class="player">
<div id="player"></div>
<h2 id="title">Select a video</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('videos',this)">Videos</div>
<div class="tab" onclick="showTab('shorts',this)">Shorts</div>
</div>

<div id="content" class="grid"></div>

<footer>
Developed by <a href="https://xplec-cipher-in.vercel.app" target="_blank">Lumivox Studios</a>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player,videos=[],shorts=[];

function onYouTubeIframeAPIReady(){
 player=new YT.Player('player',{playerVars:{controls:1,rel:0}});
}

function playVideo(id,title){
 player.loadVideoById(id);
 document.getElementById('title').innerText=title;
}

async function loadData(query='Class 5 Class 6 Class 7 Class 8'){
 const res=await fetch('/api/youtube?q='+encodeURIComponent(query)+'&type=junior');
 const data=await res.json();

 videos=data.filter(v=>!v.isShort);
 shorts=data.filter(v=>v.isShort);

 render(videos);
}

function render(arr){
 const c=document.getElementById('content');
 c.innerHTML='';
 arr.forEach(v=>{
  c.innerHTML+=`
  <div class="card" onclick="playVideo('${v.videoId}',\`${v.title}\`)">
   <img src="${v.thumbnail}">
   <h4>${v.title}</h4>
  </div>`;
 });
}

function showTab(type,el){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 render(type==='videos'?videos:shorts);
}

document.getElementById('q').addEventListener('keypress',e=>{
 if(e.key==='Enter') loadData(e.target.value);
});

loadData();
</script>
</body>
</html>
